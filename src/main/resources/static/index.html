<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Smith - Matrix Combat</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0a0a;
            color: #00ff00;
            font-family: 'Press Start 2P', monospace;
            overflow-x: hidden;
            overflow-y: auto;
            height: 100vh;
        }

        /* Matrix rain background */
        #matrix-rain {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            opacity: 0.15;
        }

        .game-container {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding: 10px;
        }

        /* Header / Scoreboard */
        .header {
            text-align: center;
            padding: 10px;
            border-bottom: 2px solid #00ff00;
            text-shadow: 0 0 10px #00ff00;
        }
        .header h1 {
            font-size: 18px;
            margin-bottom: 8px;
            color: #00ff00;
        }
        .scoreboard {
            display: flex; justify-content: center; gap: 40px;
            font-size: 11px;
        }
        .score-item { display: flex; align-items: center; gap: 8px; }
        .score-label { color: #888; }
        .score-neo { color: #ffffff; text-shadow: 0 0 8px #ffffff; }
        .score-agents { color: #00ff00; text-shadow: 0 0 8px #00ff00; }
        .round-display { color: #ffff00; text-shadow: 0 0 8px #ffff00; }

        /* Arena */
        .arena {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            min-height: 0;
        }
        #arena-svg {
            width: 100%;
            height: 100%;
        }

        /* Combat Log */
        .combat-log {
            height: 180px;
            border-top: 2px solid #00ff00;
            overflow-y: auto;
            padding: 8px;
            font-size: 8px;
            line-height: 1.6;
            background: rgba(0, 0, 0, 0.8);
        }
        .combat-log::-webkit-scrollbar { width: 6px; }
        .combat-log::-webkit-scrollbar-track { background: #111; }
        .combat-log::-webkit-scrollbar-thumb { background: #00ff00; }

        .log-entry { margin-bottom: 4px; padding: 4px; border-left: 3px solid transparent; }
        .log-entry.brown { border-color: #00cc00; color: #00ff00; }
        .log-entry.jones { border-color: #00cc00; color: #00ff00; }
        .log-entry.smith { border-color: #00ff00; color: #00ff00; }
        .log-entry.neo { border-color: #ffffff; color: #ffffff; }
        .log-entry.system { border-color: #ffff00; color: #ffff00; }
        .log-entry.progress { border-color: #666; color: #777; font-style: italic; font-size: 7px; opacity: 0.8; }
        .log-entry.win { background: rgba(255, 50, 50, 0.15); border-color: #ff4444 !important; }
        .log-entry.neo-win { background: rgba(255, 255, 255, 0.1); }
        .log-entry .agent-tag {
            font-weight: bold;
            display: inline-block;
            min-width: 60px;
        }

        /* Controls */
        .controls {
            display: flex; justify-content: center; gap: 20px;
            padding: 10px;
            border-top: 2px solid #00ff00;
        }
        button {
            font-family: 'Press Start 2P', monospace;
            font-size: 10px;
            padding: 10px 20px;
            border: 2px solid #00ff00;
            background: transparent;
            color: #00ff00;
            cursor: pointer;
            text-shadow: 0 0 5px #00ff00;
            transition: all 0.2s;
        }
        button:hover {
            background: #00ff00;
            color: #0a0a0a;
            box-shadow: 0 0 20px #00ff00;
        }
        button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        button.reset-btn {
            border-color: #ff4444;
            color: #ff4444;
            text-shadow: 0 0 5px #ff4444;
        }
        button.reset-btn:hover {
            background: #ff4444;
            color: #0a0a0a;
            box-shadow: 0 0 20px #ff4444;
        }

        button.auto-btn {
            border-color: #ffff00;
            color: #ffff00;
            text-shadow: 0 0 5px #ffff00;
        }
        button.auto-btn:hover {
            background: #ffff00;
            color: #0a0a0a;
            box-shadow: 0 0 20px #ffff00;
        }
        button.parallel-btn {
            border-color: #00ccff;
            color: #00ccff;
            text-shadow: 0 0 5px #00ccff;
        }
        button.parallel-btn:hover {
            background: #00ccff;
            color: #0a0a0a;
            box-shadow: 0 0 20px #00ccff;
        }
        .mode-label {
            font-size: 7px;
            color: #555;
            text-align: center;
            margin-bottom: 2px;
        }

        .status-text {
            text-align: center;
            font-size: 9px;
            padding: 4px;
            color: #888;
        }

        /* Mobile responsiveness */
        @media (max-width: 768px) {
            .header h1 { font-size: 11px; }
            .scoreboard { gap: 15px; font-size: 9px; }
            .controls {
                flex-wrap: wrap;
                gap: 10px;
                padding: 8px;
            }
            .controls > div { flex: 0 0 auto; }
            button { font-size: 8px; padding: 8px 12px; }
            .combat-log { height: 120px; font-size: 7px; }
            .mode-label { font-size: 6px; }
        }

        @media (max-width: 480px) {
            .header h1 { font-size: 9px; }
            .scoreboard { gap: 10px; font-size: 8px; }
            .controls {
                flex-wrap: wrap;
                gap: 8px;
                padding: 6px;
                justify-content: center;
            }
            button { font-size: 7px; padding: 6px 10px; }
            .combat-log { height: 100px; }
        }
    </style>
</head>
<body>
    <canvas id="matrix-rain"></canvas>
    <div class="game-container">
        <div class="header">
            <h1>⬛ THE MATRIX ⬛ AGENT COMBAT ARENA</h1>
            <div class="scoreboard">
                <div class="score-item">
                    <span class="score-label">NEO:</span>
                    <span class="score-neo" id="neo-score">0</span>
                </div>
                <div class="score-item">
                    <span class="round-display" id="round-display">ROUND 0</span>
                </div>
                <div class="score-item">
                    <span class="score-label">AGENTS:</span>
                    <span class="score-agents" id="agents-score">0</span>
                </div>
            </div>
        </div>

        <div class="arena">
            <svg id="arena-svg"></svg>
        </div>

        <div class="combat-log" id="combat-log">
            <div class="log-entry system">
                <span class="agent-tag">[SYSTEM]</span>
                Initializing Matrix combat simulation...
            </div>
        </div>

        <div class="status-text" id="status-text">Ready to fight</div>

        <div class="controls">
            <div style="text-align:center;display:flex;align-items:center;gap:6px">
                <input type="checkbox" id="the-one-cb" style="width:18px;height:18px;accent-color:#00ff00;cursor:pointer">
                <label for="the-one-cb" style="font-size:7px;color:#ffffff;cursor:pointer;text-shadow:0 0 5px #ffffff">NEO IS THE ONE</label>
            </div>
            <div style="text-align:center">
                <div class="mode-label">SEQUENTIAL</div>
                <button id="fight-btn" onclick="startFight('sequential')">⚔ FIGHT ⚔</button>
            </div>
            <div style="text-align:center">
                <div class="mode-label">PARALLEL</div>
                <button id="parallel-btn" class="parallel-btn" onclick="startFight('parallel')">⚡ FAST ⚡</button>
            </div>
            <div style="text-align:center">
                <div class="mode-label">AUTO-BATTLE</div>
                <button id="auto-btn" class="auto-btn" onclick="startFight('auto')">🔄 AUTO 5</button>
            </div>
            <div style="text-align:center">
                <div class="mode-label">&nbsp;</div>
                <button id="reset-btn" class="reset-btn" onclick="resetGame()">↺ RESET</button>
            </div>
        </div>
    </div>

    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script>
    // ─── Matrix Rain Background ───
    (function() {
        const canvas = document.getElementById('matrix-rain');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const chars = 'アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヰヱヲン0123456789';
        const fontSize = 14;
        const columns = Math.floor(canvas.width / fontSize);
        const drops = Array(columns).fill(1);

        function drawRain() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#00ff00';
            ctx.font = fontSize + 'px monospace';
            for (let i = 0; i < drops.length; i++) {
                const text = chars[Math.floor(Math.random() * chars.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(drawRain, 50);
        window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
    })();

    // ─── Pixel Character Definitions ───
    // Each character is an 8x8 pixel grid with normal/win/lose faces
    const PIXEL_CHARS = {
        neo: {
            color: '#ffffff',
            glow: '#ffffff',
            normal: [
                '..XXXXXX..',
                '.X......X.',
                'X........X',
                'X..XX..X.X',
                'X........X',
                'X........X',
                'X..XXXX..X',
                '.X......X.',
                '..XXXXXX..',
                '...XXXX...',
                '..XXXXXX..',
                '...X..X...',
            ],
            win: [
                '..XXXXXX..',
                '.X......X.',
                'X........X',
                'X........X',
                'X.XX..XX.X',
                'X........X',
                'X..X..X..X',
                '.X..XX..X.',
                '..XXXXXX..',
                '...XXXX...',
                '..XXXXXX..',
                '...X..X...',
            ],
            lose: [
                '..XXXXXX..',
                '.X......X.',
                'X..XX..X.X',
                'X..XX..X.X',
                'X........X',
                'X...XX...X',
                'X..X..X..X',
                '.X......X.',
                '..XXXXXX..',
                '...XXXX...',
                '....XX....',
                '...X..X...',
            ]
        },
        brown: {
            color: '#00ff00',
            glow: '#00ff00',
            normal: [
                '..XXXXXX..',
                '.X......X.',
                'X........X',
                'X..XX..X.X',
                'X........X',
                'X........X',
                'X..XXXX..X',
                '.X......X.',
                '..XXXXXX..',
                '...XXXX...',
                '..XXXXXX..',
                '...X..X...',
            ],
            win: [
                '..XXXXXX..',
                '.X......X.',
                'X........X',
                'X........X',
                'X.XX..XX.X',
                'X........X',
                'X..X..X..X',
                '.X..XX..X.',
                '..XXXXXX..',
                '...XXXX...',
                '..XXXXXX..',
                '...X..X...',
            ],
            lose: [
                '..XXXXXX..',
                '.X......X.',
                'X..XX..X.X',
                'X..XX..X.X',
                'X........X',
                'X...XX...X',
                'X..X..X..X',
                '.X......X.',
                '..XXXXXX..',
                '...XXXX...',
                '....XX....',
                '...X..X...',
            ]
        },
        jones: {
            color: '#00ff00',
            glow: '#00ff00',
            normal: [
                '..XXXXXX..',
                '.X......X.',
                'X........X',
                'X..XX..X.X',
                'X........X',
                'X........X',
                'X..XXXX..X',
                '.X......X.',
                '..XXXXXX..',
                '...XXXX...',
                '..XXXXXX..',
                '...X..X...',
            ],
            win: [
                '..XXXXXX..',
                '.X......X.',
                'X........X',
                'X........X',
                'X.XX..XX.X',
                'X........X',
                'X..X..X..X',
                '.X..XX..X.',
                '..XXXXXX..',
                '...XXXX...',
                '..XXXXXX..',
                '...X..X...',
            ],
            lose: [
                '..XXXXXX..',
                '.X......X.',
                'X..XX..X.X',
                'X..XX..X.X',
                'X........X',
                'X...XX...X',
                'X..X..X..X',
                '.X......X.',
                '..XXXXXX..',
                '...XXXX...',
                '....XX....',
                '...X..X...',
            ]
        },
        smith: {
            color: '#00ff00',
            glow: '#00ff00',
            normal: [
                '..XXXXXX..',
                '.XXXXXXXX.',
                'X........X',
                'X..XX..X.X',
                'X........X',
                'X........X',
                'X..XXXX..X',
                '.X......X.',
                '..XXXXXX..',
                '...XXXX...',
                '..XXXXXX..',
                '...X..X...',
            ],
            win: [
                '..XXXXXX..',
                '.XXXXXXXX.',
                'X........X',
                'X........X',
                'X.XX..XX.X',
                'X........X',
                'X..X..X..X',
                '.X..XX..X.',
                '..XXXXXX..',
                '...XXXX...',
                '..XXXXXX..',
                '...X..X...',
            ],
            lose: [
                '..XXXXXX..',
                '.XXXXXXXX.',
                'X..XX..X.X',
                'X..XX..X.X',
                'X........X',
                'X...XX...X',
                'X..X..X..X',
                '.X......X.',
                '..XXXXXX..',
                '...XXXX...',
                '....XX....',
                '...X..X...',
            ]
        }
    };

    let charExpressions = { neo: 'normal', brown: 'normal', jones: 'normal', smith: 'normal' };

    // ─── D3 Arena Setup ───
    const svg = d3.select('#arena-svg');
    let arenaWidth, arenaHeight, pixelSize;
    let charGroups = {};
    let positions = {};

    function setupArena() {
        const container = document.querySelector('.arena');
        arenaWidth = container.clientWidth;
        arenaHeight = container.clientHeight;
        pixelSize = Math.max(4, Math.min(arenaWidth, arenaHeight) / 50);

        svg.attr('viewBox', `0 0 ${arenaWidth} ${arenaHeight}`)
           .attr('preserveAspectRatio', 'xMidYMid meet');

        drawScene();
    }

    function drawPixelChar(group, pixels, color, glow, x, y, scale) {
        const s = pixelSize * scale;
        pixels.forEach((row, ry) => {
            [...row].forEach((ch, rx) => {
                if (ch === 'X') {
                    group.append('rect')
                        .attr('x', x + rx * s)
                        .attr('y', y + ry * s)
                        .attr('width', s)
                        .attr('height', s)
                        .attr('fill', color)
                        .attr('opacity', 0.9)
                        .style('filter', `drop-shadow(0 0 ${s}px ${glow})`);
                }
            });
        });
    }

    function updateCharExpression(key, expression) {
        charExpressions[key] = expression;
        if (charGroups[key]) {
            charGroups[key].interrupt();
            charGroups[key].selectAll('*').interrupt();
            charGroups[key].selectAll('*').remove();
            const charScale = 1.2;
            const charDef = PIXEL_CHARS[key];
            drawPixelChar(charGroups[key], charDef[expression], charDef.color, charDef.glow, positions[key].x, positions[key].y, charScale);
        }
    }

    function drawScene() {
        svg.selectAll('*').interrupt();
        svg.selectAll('*').remove();

        // Ground line
        svg.append('line')
            .attr('x1', 0).attr('y1', arenaHeight * 0.75)
            .attr('x2', arenaWidth).attr('y2', arenaHeight * 0.75)
            .attr('stroke', '#00ff00').attr('stroke-width', 2)
            .attr('opacity', 0.3);

        const charScale = 1.2;
        const charH = 12 * pixelSize * charScale;
        const groundY = arenaHeight * 0.75 - charH;

        positions = {
            brown: { x: arenaWidth * 0.15, y: groundY },
            jones: { x: arenaWidth * 0.30, y: groundY },
            neo:   { x: arenaWidth * 0.55, y: groundY },
            smith: { x: arenaWidth * 0.80, y: groundY },
        };

        charGroups = {
            brown: svg.append('g').attr('class', 'char-brown'),
            jones: svg.append('g').attr('class', 'char-jones'),
            neo:   svg.append('g').attr('class', 'char-neo'),
            smith: svg.append('g').attr('class', 'char-smith'),
        };

        const labelStyle = { 'font-family': "'Press Start 2P', monospace", 'font-size': '8px' };
        const chars = [
            { key: 'brown', color: '#00ff00', label: 'BROWN' },
            { key: 'jones', color: '#00ff00', label: 'JONES' },
            { key: 'neo',   color: '#ffffff', label: 'NEO' },
            { key: 'smith', color: '#00ff00', label: 'SMITH' },
        ];
        chars.forEach(c => {
            const charDef = PIXEL_CHARS[c.key];
            const expression = charExpressions[c.key] || 'normal';
            drawPixelChar(charGroups[c.key], charDef[expression], charDef.color, charDef.glow, positions[c.key].x, positions[c.key].y, charScale);
            svg.append('text').attr('x', positions[c.key].x + 16).attr('y', positions[c.key].y - 10)
               .attr('fill', c.color).attr('text-anchor', 'middle')
               .style('font-family', labelStyle['font-family']).style('font-size', labelStyle['font-size'])
               .text(c.label);
        });
    }

    /** Animate without redrawing — just move groups */
    function playAnimation(state) {
        if (state === 'brown-attack') {
            animateAttack(charGroups.brown, positions.brown, positions.neo);
        } else if (state === 'jones-attack') {
            animateAttack(charGroups.jones, positions.jones, positions.neo);
        } else if (state === 'smith-attack') {
            animateAttack(charGroups.smith, positions.smith, positions.neo);
        } else if (state === 'brown-wins') {
            animateAttack(charGroups.brown, positions.brown, positions.neo);
            animateDefeat(charGroups.neo, positions.neo);
        } else if (state === 'jones-wins') {
            animateAttack(charGroups.jones, positions.jones, positions.neo);
            animateDefeat(charGroups.neo, positions.neo);
        } else if (state === 'smith-wins') {
            animateAttack(charGroups.smith, positions.smith, positions.neo);
            animateDefeat(charGroups.neo, positions.neo);
        } else if (state === 'neo-wins') {
            animateVictory(charGroups.neo, positions.neo);
        }
    }

    let pendingAnimTimers = [];

    function animateAttack(charGroup, from, to) {
        charGroup.interrupt();
        charGroup.transition()
            .duration(300)
            .attr('transform', `translate(${(to.x - from.x) * 0.4}, 0)`)
            .transition()
            .duration(200)
            .attr('transform', 'translate(0, 0)');

        // Impact flash
        const timer = setTimeout(() => {
            svg.append('circle')
                .attr('cx', (from.x + to.x) / 2 + 16)
                .attr('cy', to.y + 20)
                .attr('r', 5)
                .attr('fill', '#ffff00')
                .attr('opacity', 1)
                .transition().duration(300)
                .attr('r', 30)
                .attr('opacity', 0)
                .remove();
        }, 300);
        pendingAnimTimers.push(timer);
    }

    function animateVictory(charGroup, pos) {
        charGroup.interrupt();
        charGroup.transition()
            .duration(200)
            .attr('transform', 'translate(0, -15)')
            .transition().duration(200)
            .attr('transform', 'translate(0, 0)')
            .transition().duration(200)
            .attr('transform', 'translate(0, -10)')
            .transition().duration(200)
            .attr('transform', 'translate(0, 0)');

        // Victory particles
        for (let i = 0; i < 8; i++) {
            svg.append('circle')
                .attr('cx', pos.x + 16)
                .attr('cy', pos.y + 20)
                .attr('r', 2)
                .attr('fill', '#ffffff')
                .transition().duration(500).delay(i * 50)
                .attr('cx', pos.x + 16 + (Math.random() - 0.5) * 80)
                .attr('cy', pos.y + 20 + (Math.random() - 0.5) * 80)
                .attr('opacity', 0)
                .remove();
        }
    }

    function animateDefeat(charGroup, pos) {
        // Neo gets knocked back and flashes red
        charGroup.interrupt();
        charGroup.transition()
            .duration(150)
            .attr('transform', 'translate(20, 5)')
            .transition().duration(100)
            .attr('transform', 'translate(25, 0)')
            .transition().duration(200)
            .attr('transform', 'translate(0, 0)');

        // Red hit sparks
        for (let i = 0; i < 6; i++) {
            svg.append('circle')
                .attr('cx', pos.x + 16)
                .attr('cy', pos.y + 20)
                .attr('r', 3)
                .attr('fill', '#ff4444')
                .transition().duration(400).delay(i * 40)
                .attr('cx', pos.x + 16 + (Math.random() - 0.5) * 60)
                .attr('cy', pos.y + 20 + (Math.random() - 0.5) * 60)
                .attr('opacity', 0)
                .remove();
        }
    }

    // ─── Combat Logic ───
    let fighting = false;

    function setButtonsDisabled(disabled) {
        document.getElementById('fight-btn').disabled = disabled;
        document.getElementById('parallel-btn').disabled = disabled;
        document.getElementById('auto-btn').disabled = disabled;
    }

    function startFight(mode) {
        if (fighting) return;
        fighting = true;
        setButtonsDisabled(true);
        charExpressions = { neo: 'normal', brown: 'normal', jones: 'normal', smith: 'normal' };
        pendingAnimTimers.forEach(t => clearTimeout(t));
        pendingAnimTimers = [];
        drawScene();

        if (mode === 'auto') {
            startAutoBattle();
            return;
        }

        const modeLabel = mode === 'parallel' ? 'Parallel attack...' : 'Sequential attack...';
        document.getElementById('status-text').textContent = modeLabel;
        runSingleRound(mode);
    }

    function runSingleRound(mode) {
        const theOne = document.getElementById('the-one-cb').checked;
        const eventSource = new EventSource('/api/fight/' + mode + '?theOne=' + theOne);

        eventSource.addEventListener('combat', (e) => {
            const data = JSON.parse(e.data);
            addLogEntry(data);
            updateScores(data);

            // Skip animations for progress events
            if (data.type === 'progress') return;

            // Final match outcome — update expressions to reflect the winner
            if (data.type === 'system') {
                const neoWon = data.neoScore > data.agentsScore;
                updateCharExpression('brown', neoWon ? 'lose' : 'win');
                updateCharExpression('jones', neoWon ? 'lose' : 'win');
                updateCharExpression('smith', neoWon ? 'lose' : 'win');
                updateCharExpression('neo', neoWon ? 'win' : 'lose');
                return;
            }

            const agentKey = data.agent.toLowerCase();

            // Update pixel face expressions per individual fight
            if (data.type === 'attack-win') {
                updateCharExpression(agentKey, 'win');
                updateCharExpression('neo', 'lose');
            } else if (data.type === 'attack') {
                updateCharExpression(agentKey, 'lose');
                updateCharExpression('neo', 'win');
            }

            if (data.agent === 'Brown' && data.type === 'attack-win') {
                playAnimation('brown-wins');
            } else if (data.agent === 'Brown') {
                playAnimation('brown-attack');
            } else if (data.agent === 'Jones' && data.type === 'attack-win') {
                playAnimation('jones-wins');
            } else if (data.agent === 'Jones') {
                playAnimation('jones-attack');
            } else if (data.agent === 'Smith' && data.type === 'attack-win') {
                playAnimation('smith-wins');
            } else if (data.agent === 'Smith') {
                playAnimation('smith-attack');
            } else if (data.type === 'result') {
                // Determine round winner from the message text
                const msg = (data.message || '').toLowerCase();
                const neoLost = msg.includes('neo loses');
                updateCharExpression('brown', neoLost ? 'win' : 'lose');
                updateCharExpression('jones', neoLost ? 'win' : 'lose');
                updateCharExpression('smith', neoLost ? 'win' : 'lose');
                updateCharExpression('neo', neoLost ? 'lose' : 'win');
            }
        });

        eventSource.onerror = () => {
            eventSource.close();
            fighting = false;
            setButtonsDisabled(false);
            document.getElementById('status-text').textContent = 'Ready for next round';
        };

        return eventSource;
    }

    function startAutoBattle() {
        document.getElementById('status-text').textContent = 'Auto-battle to 5...';
        // Reset scores for a fresh auto-battle
        fetch('/api/reset', { method: 'POST' }).then(() => {
            document.getElementById('neo-score').textContent = '0';
            document.getElementById('agents-score').textContent = '0';
            document.getElementById('round-display').textContent = 'ROUND 0';
            addLogEntry({ agent: 'System', type: 'system', message: 'AUTO-BATTLE: Neo must survive 5 rounds!', neoScore: 0, agentsScore: 0, round: 0 });
            runAutoRound();
        });
    }

    function runAutoRound() {
        // Read checkbox fresh each round
        const theOne = document.getElementById('the-one-cb').checked;
        document.getElementById('status-text').textContent = theOne ? 'Auto-battle (THE ONE)...' : 'Auto-battle...';
        const eventSource = new EventSource('/api/fight/parallel?theOne=' + theOne);
        let lastData = null;
        let neoLost = false;
        let roundCount = 0;

        eventSource.addEventListener('combat', (e) => {
            const data = JSON.parse(e.data);
            lastData = data;
            roundCount = data.round;
            addLogEntry(data);
            updateScores(data);
            if (data.type === 'progress' || data.type === 'system') return;

            const agentKey = data.agent.toLowerCase();
            if (data.type === 'attack-win') {
                neoLost = true;
                updateCharExpression(agentKey, 'win');
                updateCharExpression('neo', 'lose');
            } else if (data.type === 'attack') {
                updateCharExpression(agentKey, 'lose');
                updateCharExpression('neo', 'win');
            } else if (data.type === 'result') {
                const msg = (data.message || '').toLowerCase();
                const lost = msg.includes('neo loses');
                updateCharExpression('brown', lost ? 'win' : 'lose');
                updateCharExpression('jones', lost ? 'win' : 'lose');
                updateCharExpression('smith', lost ? 'win' : 'lose');
                updateCharExpression('neo', lost ? 'lose' : 'win');
            }

            if (data.agent === 'Brown' && data.type === 'attack-win') playAnimation('brown-wins');
            else if (data.agent === 'Brown') playAnimation('brown-attack');
            else if (data.agent === 'Jones' && data.type === 'attack-win') playAnimation('jones-wins');
            else if (data.agent === 'Jones') playAnimation('jones-attack');
            else if (data.agent === 'Smith' && data.type === 'attack-win') playAnimation('smith-wins');
            else if (data.agent === 'Smith') playAnimation('smith-attack');
        });

        eventSource.onerror = () => {
            eventSource.close();
            if (neoLost || (lastData && roundCount >= 5)) {
                // Battle over — Neo lost or survived 5 rounds
                const neoWon = !neoLost && roundCount >= 5;
                const winner = neoWon ? 'NEO SURVIVES 5 ROUNDS! The One cannot be stopped.' : 'NEO LOSES! The Matrix is restored.';
                updateCharExpression('brown', neoWon ? 'lose' : 'win');
                updateCharExpression('jones', neoWon ? 'lose' : 'win');
                updateCharExpression('smith', neoWon ? 'lose' : 'win');
                updateCharExpression('neo', neoWon ? 'win' : 'lose');
                addLogEntry({ agent: 'System', type: 'system', message: winner, neoScore: lastData.neoScore, agentsScore: lastData.agentsScore, round: roundCount });
                fighting = false;
                setButtonsDisabled(false);
                document.getElementById('status-text').textContent = winner;
            } else {
                // More rounds to go — fire next round after a brief pause
                setTimeout(() => {
                    charExpressions = { neo: 'normal', brown: 'normal', jones: 'normal', smith: 'normal' };
                    drawScene();
                    runAutoRound();
                }, 500);
            }
        };
    }

    function addLogEntry(data) {
        const log = document.getElementById('combat-log');
        const agentClass = data.agent.toLowerCase();
        const isWin = data.type === 'attack-win';
        const isProgress = data.type === 'progress';
        const entry = document.createElement('div');
        entry.className = `log-entry ${isProgress ? 'progress' : agentClass}${isWin ? ' win' : ''}`;
        if (isProgress) {
            entry.innerHTML = `<span class="agent-tag">[LOG]</span> ⏳ ${data.message}`;
            // Update status bar too
            document.getElementById('status-text').textContent = data.message;
        } else {
            const prefix = isWin ? '💥 ' : '';
            const suffix = isWin ? ' ⚡ AGENT WINS!' : '';
            entry.innerHTML = `<span class="agent-tag">[${data.agent.toUpperCase()}]</span> ${prefix}${data.message}${suffix}`;
        }
        log.appendChild(entry);
        log.scrollTop = log.scrollHeight;
    }

    function updateScores(data) {
        document.getElementById('neo-score').textContent = data.neoScore;
        document.getElementById('agents-score').textContent = data.agentsScore;
        document.getElementById('round-display').textContent = `ROUND ${data.round}`;
    }

    async function resetGame() {
        const resp = await fetch('/api/reset', { method: 'POST' });
        const data = await resp.json();
        document.getElementById('neo-score').textContent = '0';
        document.getElementById('agents-score').textContent = '0';
        document.getElementById('round-display').textContent = 'ROUND 0';
        document.getElementById('combat-log').innerHTML =
            '<div class="log-entry system"><span class="agent-tag">[SYSTEM]</span> Combat arena reset. Agents reloaded.</div>';
        document.getElementById('status-text').textContent = 'Ready to fight';
        pendingAnimTimers.forEach(t => clearTimeout(t));
        pendingAnimTimers = [];
        charExpressions = { neo: 'normal', brown: 'normal', jones: 'normal', smith: 'normal' };
        drawScene();
    }

    // Initialize
    window.addEventListener('load', setupArena);
    window.addEventListener('resize', setupArena);
    </script>
</body>
</html>
